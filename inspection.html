<!DOCTYPE html>
<html>

<head>

<title>Inspection Form</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

Inspection Form

</header>



<div class="container">

<div class="card">

<h2 style="text-align:center">
Add / Edit Inspection
</h2>

<!-- Entered By -->

<label>Entered By</label>

<input id="enteredBy"
placeholder="Entered By">



<!-- Name -->

<label>Inspector Name</label>

<input id="name"
placeholder="Inspector Name">



<!-- Designation -->

<label>Designation</label>

<input id="designation"
placeholder="Designation">



<!-- Location -->

<label>Location</label>

<input id="location"
readonly
placeholder="Click Get Location">


<button onclick="getLocation()">

Get Location

</button>



<!-- Date -->

<label>Date</label>

<input type="date"
id="date">



<!-- Time -->

<label>Time</label>

<input type="time"
id="time">



<!-- Followup -->

<label>Inspection Follow-up</label>

<textarea id="followup"
placeholder="Inspection details">

</textarea>



<!-- Photo -->

<label>Take Inspection Photo</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">



<!-- SAVE BUTTON -->

<button onclick="saveData()">

Save Inspection

</button>



<!-- BACK BUTTON -->

<button onclick="goHome()"
class="cancelBtn">

Back

</button>



</div>

</div>



<script type="module"
src="app.js"></script>

<script>

function goHome(){

window.location="index.html";

}

</script>


</body>

</html>
