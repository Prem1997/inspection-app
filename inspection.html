<!DOCTYPE html>
<html>

<head>

<title>Inspection Form</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

Inspection Form

</header>


<div class="container">

<div class="card">

<h2 class="formTitle">
Add / Edit Inspection
</h2>


<label>Entered By</label>
<input id="enteredBy"
placeholder="Entered By">


<label>Inspector Name</label>
<input id="name"
placeholder="Inspector Name">


<label>Designation</label>
<input id="designation"
placeholder="Designation">


<label>Location</label>

<input id="location"
readonly
placeholder="Click Get Location">

<button class="locationBtn"
onclick="getLocation()">

Get Location

</button>


<label>Date</label>
<input type="date"
id="date">


<label>Time</label>
<input type="time"
id="time">


<label>Inspection Follow-up</label>

<textarea id="followup"
placeholder="Inspection details">

</textarea>


<label>Take Inspection Photo</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">


<button class="saveBtn"
onclick="saveData()">

Save Inspection

</button>


<button class="backBtn"
onclick="goHome()">

Back

</button>


</div>

</div>



<script type="module"
src="app.js"></script>


<script>

function goHome(){

window.location="index.html";

}

</script>

</body>

</html>
