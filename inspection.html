<!DOCTYPE html>
<html>

<head>

<title>Add Inspection</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

Inspection Form

</header>

<div class="container">

<div class="card">

<input id="enteredBy"
placeholder="Entered By">

<input id="name"
placeholder="Inspector Name">

<input id="designation"
placeholder="Designation">


<label>Location</label>

<input id="location"
readonly>

<button onclick="getLocation()">

Get Location

</button>


<label>Date</label>

<input type="date"
id="date">


<label>Time</label>

<input type="time"
id="time">


<textarea id="followup"
placeholder="Inspection Follow-up">

</textarea>


<label>Take Photo</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">


<button onclick="saveData()">

Save Inspection

</button>


<button onclick="goHome()">

Back

</button>


</div>

</div>


<script type="module"
src="app.js"></script>

</body>

</html>
