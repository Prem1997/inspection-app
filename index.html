<!DOCTYPE html>
<html>

<head>

<title>Inspection App</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

Inspection Monitoring System

</header>


<div class="container">

<div class="card">

<h2>Inspection Entry</h2>

<input id="enteredBy"
placeholder="Entered By">

<input id="name"
placeholder="Inspector Name">

<input id="designation"
placeholder="Designation">


<input id="location"
placeholder="Fetching location..."
readonly>


<label>Date</label>

<input type="date"
id="date">


<label>Time</label>

<input type="time"
id="time">


<textarea id="followup"
placeholder="Inspection Followup"></textarea>


<label>Take Photo</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">


<button onclick="saveData()">

Submit Inspection

</button>

</div>


<h2 class="title">
Dashboard Summary
</h2>

<div class="dashboard">

<div class="box">
Total Inspections
<h3 id="totalCount">0</h3>
</div>

<div class="box">
Today Inspections
<h3 id="todayCount">0</h3>
</div>

</div>


<h2 class="title">
Inspection Records
</h2>


<div id="records">

</div>


</div>


<script type="module" src="app.js"></script>

</body>

</html>
